      rel="icon"

    <title>Brenda - Développeuse Web Full-Stack | Portfolio</title>
    <meta
      name="description"
      content="Portfolio de Brenda, développeuse web full-stack formée à Holberton School. Spécialisée en JavaScript, Python, React, Django."

                        class="sun-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2" />

                        <path d="m4.93 4.93 1.41 1.41" />

                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"

                        <path
                          d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
